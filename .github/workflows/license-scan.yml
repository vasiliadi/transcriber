# Scope: Python (pip) dependencies only, via pip-licenses. Does NOT cover the
# conda/system packages layered in by the pixi `docker` environment (see
# THIRD_PARTY_NOTICES.md "Conda / system packages" section for that inventory,
# e.g. ffmpeg's GPL build) — those must be reviewed manually if the conda deps
# in pyproject.toml change.
name: License scan

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "pyproject.toml"
      - "pixi.lock"
      - ".github/workflows/license-scan.yml"
  # No paths filter here: this job is a REQUIRED status check, so it must run
  # (and report a status) on every PR. Path filtering happens inside the job via
  # the "changes" step, so PRs that don't touch dependency files still report a
  # green status instead of blocking the merge forever.
  pull_request:
    branches: ["main"]

jobs:
  scan:
    name: Fail on incompatible dependency licenses
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Detect dependency changes
        id: changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            deps:
              - "pyproject.toml"
              - "pixi.lock"
              - ".github/workflows/license-scan.yml"

      - name: Set up pixi
        if: steps.changes.outputs.deps == 'true'
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          environments: license-scan

      # Fail only on network-copyleft / source-available / unknown licenses.
      # GPL-2.0-or-later (mutagen, via yt-dlp) is intentionally allowed: it is
      # compatible with the project's Unlicense and documented in
      # THIRD_PARTY_NOTICES.md. This guardrail catches a NEW incompatible dep.
      #
      # NOTE: pip-licenses --fail-on matches its own *display names* (derived
      # verbatim from trove classifiers), NOT SPDX identifiers. The AGPL strings
      # in the `license-scan` pixi task (pyproject.toml) are the exact classifier
      # names. SSPL / BUSL / Elastic / Commons Clause carry no OSI classifier, so
      # pip-licenses reports them as UNKNOWN, which is caught by the UNKNOWN token.
      - name: Check dependency licenses
        if: steps.changes.outputs.deps == 'true'
        run: pixi run license-scan
